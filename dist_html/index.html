<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- SEO Meta Tags -->
  <title>AntiGPT - One Daily Puzzle to Spark Creative Thinking</title>
  <meta name="description" content="Fight AI brain rot with AntiGPT. One daily puzzle to uncover hidden patterns, spark fresh thinking across fields, and test your creativity limits." />
  <meta name="keywords" content="daily puzzle, creative thinking, brain exercise, pattern recognition, logic games, anti gpt, cognitive challenge" />
  <meta name="author" content="AntiGPT" />
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://antigpt.pages.dev/" />
  <meta property="og:title" content="AntiGPT - One Daily Puzzle to Spark Creative Thinking" />
  <meta property="og:description" content="Fight AI brain rot with AntiGPT. Discover patterns and challenge your creativity daily." />
  <meta property="og:image" content="https://antigpt.pages.dev/og-image.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://antigpt.pages.dev/" />
  <meta property="twitter:title" content="AntiGPT - One Daily Puzzle to Spark Creative Thinking" />
  <meta property="twitter:description" content="Fight AI brain rot with AntiGPT. Discover patterns and challenge your creativity daily." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #030712;
      --panel-bg: rgba(17, 24, 39, 0.7);
      --primary-glow: #3b82f6;
      --secondary-glow: #10b981;
      --accent-purple: #8b5cf6;
      --border-color: rgba(255, 255, 255, 0.08);
      --text-primary: #f9fafb;
      --text-muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      position: relative;
    }

    /* Ambient Background Glows */
    body::before {
      content: '';
      position: absolute;
      top: -10%;
      left: 20%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      bottom: -10%;
      right: 20%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.12) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    header {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 10;
    }

    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .logo:hover {
      opacity: 0.9;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 3rem 1.5rem;
      position: relative;
      z-index: 10;
      max-width: 1000px;
      margin: 0 auto;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.25);
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #93c5fd;
      margin-bottom: 2rem;
      text-transform: uppercase;
      animation: pulse 2s infinite;
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
    }

    .highlight {
      background: linear-gradient(135deg, #60a5fa, #34d399, #a78bfa);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 4s ease infinite;
    }

    .tagline {
      font-size: clamp(1.1rem, 2vw, 1.35rem);
      color: var(--text-muted);
      max-width: 700px;
      margin-bottom: 3.5rem;
      line-height: 1.6;
    }

    /* Glassmorphic Interaction Card */
    .cta-container {
      background: var(--panel-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 3rem;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 40px rgba(59, 130, 246, 0.1);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      margin-bottom: 2.5rem;
    }

    .cta-container:hover {
      border-color: rgba(139, 92, 246, 0.3);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 50px rgba(139, 92, 246, 0.15);
      transform: translateY(-2px);
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      width: 100%;
    }

    @media (min-width: 600px) {
      .btn-group {
        flex-direction: row;
      }
    }

    .btn {
      flex: 1;
      padding: 1.15rem 2rem;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: #ffffff;
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.35);
      border: none;
    }

    .btn-primary:hover {
      box-shadow: 0 6px 25px rgba(139, 92, 246, 0.5);
      transform: scale(1.02);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.03);
      border-color: var(--text-muted);
    }

    .stats-line {
      margin-top: 2rem;
      font-size: 0.95rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      font-weight: 600;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.75rem;
    }

    .stats-line::before, .stats-line::after {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: var(--secondary-glow);
    }

    footer {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      border-top: 1px solid var(--border-color);
      position: relative;
      z-index: 10;
    }

    .footer-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .footer-link:hover {
      color: var(--text-primary);
    }

    /* Keyframes animations */
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.85; transform: scale(0.98); }
    }

    @keyframes shine {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo">AntiGPT</a>
  </header>

  <main>
    <div class="badge">
      <span>💡 creativity is your edge</span>
    </div>

    <h1>In the age of AI brain rot,<br><span class="highlight">creativity is your edge.</span></h1>
    
    <p class="tagline">AntiGPT is one daily puzzle to uncover hidden patterns and spark fresh thinking across fields. Join, play, and see how far your mind can go.</p>

    <div class="cta-container">
      <div class="btn-group">
        <button class="btn btn-primary" onclick="alert('Today\'s challenge: Extract a pattern from chaos. Loading puzzle engine...')">Start today's challenge</button>
        <button class="btn btn-secondary" onclick="alert('Stats: 98% of users solved today\'s puzzle. Global rank list loading...')">See today's stats</button>
      </div>

      <div class="stats-line">
        <span>2026-06-06 • Question No. 266</span>
      </div>
    </div>
  </main>

  <footer>
    <a href="/privacy" class="footer-link">Privacy Policy</a>
  </footer>
</body>
</html>
